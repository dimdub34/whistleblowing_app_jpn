{{ block styles }}
<style>
    textarea {
        height: 200px;
    }
</style>
{{ endblock }}

{{ block title }}
パート2：質問票
{{ endblock }}

{{ block content }}

<div class="card bg-light mb-3">
    <div class="card-body">
        <p>
            先ほど参加したゲームに関連する以下の質問にご回答ください。
        </p>
    </div>
</div>

<div class="mb-3">
    {{ for field in form }}
    <div class="form-control mb-1">
        <p>
            {{ field.label|safe }}
        </p>
        {{ field }}
    </div>
    {{ endfor }}
</div>

{{ next_button }}

{{ endblock }}

{{ block scripts }}
<script src="{{ static 'global/fill_auto.js' }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (js_vars.fill_auto)
            fill_auto();
    });
</script>
{{ endblock }}
